<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LIANJOY - Tienda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-terra-green { background-color: #1B4332; }
        .text-terra-green { color: #1B4332; }
        
        /* Configuración de la imagen de fondo de la página */
        .bg-image-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #000;
        }
        .bg-image-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(10px);
            opacity: 0.8;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="bg-image-container">
        <img src="/imagenes/fondo.png" alt="fondo"> 
    </div>

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-50">
        <a href="/" class="flex items-center gap-2">
            <div class="bg-terra-green p-1.5 rounded-lg">
                <span class="text-white font-black text-xl italic tracking-tighter">LJ</span>
            </div>
            <span class="text-terra-green font-extrabold text-xl tracking-tight">LIANJOY</span>
        </a>

        <div class="flex items-center gap-6">
            <a href="/acceso" class="bg-terra-green text-white p-2.5 rounded-xl shadow-lg shadow-green-900/20 hover:scale-110 active:scale-95 transition-all flex items-center justify-center" title="Mi Cuenta">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </a>
            <a th:href="@{/carrito}" class="group relative p-2 bg-gray-50 rounded-full hover:bg-gray-100 transition">
    <span class="text-xl">🛒</span>
    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 rounded-full border-2 border-white" 
          th:text="${session.carrito != null ? session.carrito.size() : '0'}">
        0
    </span>
</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        
      <div class="relative overflow-hidden rounded-3xl shadow-2xl mb-12 group">
    
    <img src="/imagenes/aventura.png" 
         class="w-full h-auto block transition-transform duration-700 group-hover:scale-105" 
         alt="Nueva Colección">
    
    <div class="absolute inset-0 flex flex-col justify-end p-6 md:p-12 bg-gradient-to-t from-black/70 via-black/20 to-transparent">
        
        <h1 class="text-4xl md:text-6xl font-extrabold text-white leading-[1.1] tracking-tight drop-shadow-2xl">
            Descubre tu<br>próxima aventura
        </h1>
        
        <p class="text-white/90 text-sm md:text-base mt-4 font-medium max-w-md hidden md:block drop-shadow-lg">
            Explora el mundo con el mejor equipo técnico. Diseñado para resistir, creado para durar.
        </p>
        
    </div>
</div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div th:each="p : ${productos}" class="bg-white/90 backdrop-blur-sm p-5 rounded-2xl shadow-sm border border-white hover:shadow-xl transition-shadow">
        
       <div class="bg-gray-100 rounded-xl mb-4 overflow-hidden h-48 flex items-center justify-center">
    <img th:src="${p.imagenUrl != null} ? @{'/imagenes/' + ${p.imagenUrl}} : '/imagenes/placeholder.png'" 
         class="w-full h-full object-cover p-0" 
         th:alt="${p.nombre}">
</div>
        <h3 class="font-bold text-lg text-gray-800" th:text="${p.nombre}">Nombre</h3>
        <p class="text-terra-green font-black text-2xl mb-4" th:text="'$' + ${p.precio}">$0.00</p>
        
        <form th:action="@{/carrito/agregar}" method="post">
            <input type="hidden" name="productoId" th:value="${p.id}">
            <button type="submit" class="w-full bg-terra-green text-white py-3 rounded-xl font-bold hover:bg-green-900 active:scale-95 transition-all">
                Añadir al Carrito
            </button>
        </form>
    </div>
</div>
    </div>
</body>
</html>
