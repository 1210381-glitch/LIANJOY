<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - LIANJOY</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black text-gray-800 tracking-tighter italic">PANEL DE CONTROL - LIANJOY</h1>
            <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-red-600 transition-colors">Cerrar Sesión</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <section class="lg:col-span-1">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-200">
                    <h3 class="font-black text-gray-700 mb-4 uppercase text-xs tracking-widest">Nuevo Producto</h3>
                    
                    <form th:action="@{/admin/productos/guardar}" method="post" enctype="multipart/form-data" class="space-y-4">
                        <input type="text" name="nombre" placeholder="Nombre del producto" required 
                               class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-800">
                        
                        <textarea name="descripcion" placeholder="Descripción" rows="2"
                                  class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-800"></textarea>
                        
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" step="0.01" name="precio" placeholder="Precio ($)" required 
                                   class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-800">
                            <input type="number" name="stock" placeholder="Stock" required 
                                   class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-green-800">
                        </div>

                        <div class="bg-gray-50 border-2 border-dashed border-gray-200 p-4 rounded-2xl">
                            <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Opción A: Archivo local</p>
                            <input type="file" name="archivoImagen" class="text-xs text-gray-500 w-full mb-3
                                file:mr-4 file:py-2 file:px-4
                                file:rounded-full file:border-0
                                file:text-xs file:font-semibold
                                file:bg-green-50 file:text-green-700
                                hover:file:bg-green-100">
                            
                            <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Opción B: URL Externa</p>
                            <input type="text" name="imagenUrl" placeholder="https://ejemplo.com/reloj.jpg" 
                                   class="w-full p-2 text-xs border rounded-lg outline-none focus:ring-1 focus:ring-green-800">
                        </div>
                        
                        <button type="submit" class="w-full bg-[#1B4332] text-white py-4 rounded-xl font-bold hover:bg-green-900 transition-all shadow-lg uppercase text-sm tracking-widest">
                            Publicar Producto
                        </button>
                    </form>
                </div>
            </section>

            <div class="lg:col-span-2 space-y-8">
                
                <section class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200">
                    <div class="bg-gray-800 p-4">
                        <h3 class="text-white font-bold uppercase text-[10px] tracking-widest">Pedidos Recibidos (Ventas)</h3>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 text-[10px] font-black text-gray-500 uppercase">Cliente</th>
                                <th class="p-4 text-[10px] font-black text-gray-500 uppercase">Total</th>
                                <th class="p-4 text-[10px] font-black text-gray-500 uppercase">Estado</th>
                                <th class="p-4 text-[10px] font-black text-gray-500 uppercase">Fecha</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="pedido : ${pedidos}" class="border-b hover:bg-gray-50 transition-colors">
                                <td class="p-4">
                                    <div class="text-sm font-bold text-gray-800" th:text="${pedido.clienteEmail}"></div>
                                    <div class="text-[10px] text-gray-400" th:text="${pedido.direccion}"></div>
                                </td>
                                <td class="p-4 font-bold text-green-700" th:text="'$' + ${pedido.total}"></td>
                                <td class="p-4">
                                    <span class="px-2 py-1 bg-orange-100 text-orange-600 text-[9px] font-black rounded-full uppercase" 
                                          th:text="${pedido.estadoPedido}"></span>
                                </td>
                                <td class="p-4 text-[10px] text-gray-500" th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </section>

                <section class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200">
                    <div class="bg-gray-800 p-4">
                        <h3 class="text-white font-bold uppercase text-[10px] tracking-widest">Inventario Actual</h3>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4 text-[10px] font-black text-gray-500 uppercase">Producto</th>
                                <th class="p-4 text-[10px] font-black text-gray-500 uppercase">Precio</th>
                                <th class="p-4 text-[10px] font-black text-gray-500 uppercase">Stock</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="producto : ${productos}" class="border-b hover:bg-gray-50 transition-colors">
                                <td class="p-4">
                                    <div class="flex items-center space-x-3">
                                        <img th:src="${producto.imagen}" class="w-10 h-10 object-cover rounded-lg border shadow-sm" alt="img">
                                        <span class="text-sm font-bold text-gray-800" th:text="${producto.nombre}"></span>
                                    </div>
                                </td>
                                <td class="p-4 text-sm text-gray-600 font-medium" th:text="'$' + ${producto.precio}"></td>
                                <td class="p-4">
                                    <span th:class="${producto.stock < 5} ? 'text-red-600 font-bold bg-red-50 px-2 py-1 rounded-lg text-xs' : 'text-gray-600 text-xs'" 
                                          th:text="${producto.stock} + ' u.'"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
