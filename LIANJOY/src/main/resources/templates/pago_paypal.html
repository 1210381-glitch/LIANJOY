<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pago con PayPal - LIANJOY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=MXN"></script>
    <style>
        .bg-terra-green { background-color: #1B4332; }
        .bg-image-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-color: #000;
        }
        .bg-image-container img {
            width: 100%; height: 100%; object-fit: cover; filter: blur(15px); opacity: 0.5;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-image-container"><img src="/imagenes/fondo.png"></div>

    <div class="max-w-md w-full p-6">
        <div class="bg-white/90 backdrop-blur-md rounded-3xl p-8 shadow-2xl text-center border border-white/50">
            <h2 class="text-2xl font-black text-gray-800 mb-2 italic">FINALIZAR PAGO</h2>
            <p class="text-gray-500 text-sm mb-6 uppercase tracking-widest font-bold">Resumen de transacción</p>
            
            <div class="bg-gray-50 rounded-2xl p-4 mb-8 border border-gray-100">
                <span class="text-gray-400 text-xs font-bold block mb-1 uppercase">Total a pagar ahora</span>
                <span class="text-3xl font-black text-terra-green" id="monto-total" th:text="${total}">0.00</span>
                <span class="text-terra-green font-bold text-lg"> MXN</span>
            </div>

            <div id="paypal-button-container"></div>

            <a href="/checkout" class="block mt-6 text-[10px] font-black text-gray-400 hover:text-red-700 hover:underline uppercase tracking-tighter">
                Cancelar y volver a dirección
            </a>
        </div>
    </div>

    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                // Obtenemos el total dinámico que viene de tu controlador Java
                const totalValue = document.getElementById('monto-total').innerText;
                
                return actions.order.create({
                    purchase_units: [{
                        amount: { 
                            currency_code: 'MXN', // Moneda nacional corregida
                            value: totalValue 
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    // Al aprobarse el pago, redirigimos al controlador de éxito
                    // Esto activará session.removeAttribute("carrito") en Java
                    window.location.href = "/pedido/exito"; 
                });
            },
            onError: function(err) {
                console.error("Error en el pago:", err);
                alert("Hubo un problema con la transacción. Por favor, intenta de nuevo.");
            }
        }).render('#paypal-button-container');
    </script>
</body>
</html>
