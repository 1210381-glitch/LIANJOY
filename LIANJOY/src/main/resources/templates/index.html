<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LIANJOY - Tienda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-terra-green { background-color: #1B4332; }
        .text-terra-green { color: #1B4332; }
        
        /* Fondo difuminado fijo */
        .bg-image-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #000;
        }
        .bg-image-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(10px);
            opacity: 0.8;
        }

        /* Animación suave para el menú desplegable del usuario */
        .group:hover .user-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .user-dropdown {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="bg-image-container">
        <img src="/imagenes/fondo.png" alt="fondo"> 
    </div>

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-50">
        <a href="/" class="flex items-center gap-2">
            <div class="bg-terra-green p-1.5 rounded-lg">
                <span class="text-white font-black text-xl italic tracking-tighter">LJ</span>
            </div>
            <span class="text-terra-green font-extrabold text-xl tracking-tight">LIANJOY</span>
        </a>

        <div class="flex items-center gap-6">
            
            <div class="relative group">
                <div class="flex items-center">
                    <a th:if="${session.usuarioLogueado == null}" href="/acceso" 
                       class="bg-terra-green text-white p-2.5 rounded-xl shadow-lg hover:scale-110 transition-all flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </a>

                    <button th:if="${session.usuarioLogueado != null}" 
                            class="bg-terra-green text-white p-2.5 rounded-xl shadow-lg flex items-center gap-2 hover:bg-green-800 transition-all border border-white/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span class="text-[10px] font-black uppercase hidden md:block" 
                              th:text="${session.esAdmin ? 'ADMIN' : session.usuarioLogueado.email}">USUARIO</span>
                    </button>
                </div>

                <div th:if="${session.usuarioLogueado != null}" 
                     class="user-dropdown absolute right-0 top-full mt-2 w-56 bg-white rounded-2xl shadow-2xl border border-gray-100 py-3 z-50">
                    <div class="px-4 py-2 border-b border-gray-50 mb-2">
                        <p class="text-[9px] text-gray-400 font-black uppercase tracking-widest">Cuenta Activa</p>
                        <p class="text-xs font-bold text-gray-800 truncate" th:text="${session.usuarioLogueado.email}"></p>
                    </div>

                    <a th:if="${session.esAdmin}" href="/admin/panel" 
                       class="flex items-center gap-2 px-4 py-2.5 text-xs font-bold text-blue-600 hover:bg-blue-50 transition-colors">
                        <span>⚙️</span> PANEL ADMIN
                    </a>

                    <a href="/logout" 
                       class="flex items-center gap-2 px-4 py-2.5 text-xs font-bold text-red-600 hover:bg-red-50 transition-colors">
                        <span>🚪</span> CERRAR SESIÓN
                    </a>
                </div>
            </div>

            <a th:href="@{/carrito}" class="group relative p-2 bg-gray-50 rounded-full hover:bg-gray-100 transition">
                <span class="text-xl">🛒</span>
                <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 rounded-full border-2 border-white" 
                      th:text="${session.carrito != null ? session.carrito.size() : '0'}">0</span>
            </a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        <div class="relative overflow-hidden rounded-3xl shadow-2xl mb-12 group">
            <img src="/imagenes/aventura.png" class="w-full h-auto block transition-transform duration-700 group-hover:scale-105" alt="Nueva Colección">
            <div class="absolute inset-0 flex flex-col justify-end p-6 md:p-12 bg-gradient-to-t from-black/70 via-black/20 to-transparent">
                <h1 class="text-4xl md:text-6xl font-extrabold text-white leading-[1.1] tracking-tight drop-shadow-2xl">Descubre tu<br>próxima aventura</h1>
                <p class="text-white/90 text-sm md:text-base mt-4 font-medium max-w-md hidden md:block drop-shadow-lg">Disfruta tu proximo Camporee con el mejor equipo técnico. Diseñado para resistir, creado para durar.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div th:each="p : ${productos}" 
                 class="bg-white p-6 rounded-[2rem] shadow-lg border border-gray-100 hover:shadow-2xl transition-all cursor-pointer group mb-4" 
                 th:attr="data-prod-id=${p.id}, 
                          data-prod-name=${p.nombre}, 
                          data-prod-price=${p.precio}, 
                          data-prod-img=${p.imagenUrl}, 
                          data-prod-desc-long=${p.descripcion}" 
                 onclick="triggerModalFromCard(this)">
                
                <div class="bg-gray-100 rounded-2xl mb-4 overflow-hidden h-48 flex items-center justify-center border border-gray-50">
                    <img th:src="${p.imagenUrl != null} ? @{'/imagenes/' + ${p.imagenUrl}} : '/imagenes/placeholder.png'" 
                         class="w-full h-full object-cover transition-transform group-hover:scale-110" 
                         th:alt="${p.nombre}">
                </div>
                
                <h3 class="font-bold text-lg text-gray-800 mb-1" th:text="${p.nombre}">Nombre</h3>
                <p class="text-terra-green font-black text-2xl mb-4" th:text="'$' + ${p.precio}">$0.00</p>
                
                <button class="w-full bg-gray-100 text-gray-600 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-gray-200 transition active:scale-95">
                    Detalles
                </button>
            </div>
        </div>
    </div>

    <div id="productQuickViewModal" class="fixed inset-0 z-[100] hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0 bg-black/60 backdrop-blur-sm">
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <div class="inline-block align-bottom bg-white rounded-[2rem] text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full border border-white/50">
                <button onclick="closeQuickViewModal()" class="absolute top-5 right-5 text-gray-400 hover:text-gray-600 transition p-2 bg-gray-100 rounded-full z-10">
                    <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>

                <div class="bg-white grid grid-cols-1 md:grid-cols-2 gap-0">
                    <div class="w-full h-full flex items-center justify-center p-10 bg-gray-50 border-r border-gray-100">
                        <img id="modalProductImage" src="/imagenes/placeholder.png" alt="Producto" class="max-h-[400px] object-contain">
                    </div>

                    <div class="p-10 flex flex-col justify-between">
                        <div>
                            <p class="text-[11px] text-gray-400 font-bold uppercase tracking-[0.2em] mb-1"> LIANJOY </p>
                            <h2 id="modalProductName" class="text-3xl font-black text-gray-900 tracking-tighter mb-4 italic uppercase">Nombre del Producto</h2>
                            
                            <div class="flex items-baseline gap-2 mb-6 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                <span class="text-gray-500 text-sm font-medium">Precio:</span>
                                <span id="modalProductPrice" class="text-4xl font-extrabold text-[#1B4332]">$0.00</span>
                                <span class="text-gray-400 text-xs uppercase font-bold tracking-wider">MXN</span>
                            </div>

                            <h4 class="text-xs font-black text-gray-800 uppercase tracking-widest mb-2">Descripción </h4>
                            <p id="modalProductDescriptionLong" class="text-gray-600 text-sm leading-relaxed mb-8">Cargando descripción...</p>
                        </div>

                        <form id="modalAddToCartForm" method="post" action="/carrito/agregar">
                            <input type="hidden" name="productoId" id="modalProductIdInput">
                            <button type="submit" class="w-full bg-[#1B4332] text-white py-4 rounded-xl font-black text-lg shadow-xl hover:bg-green-900 transition-all uppercase tracking-widest active:scale-95">
                                Añadir al Carrito
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('productQuickViewModal');
        const mImage = document.getElementById('modalProductImage');
        const mName = document.getElementById('modalProductName');
        const mPrice = document.getElementById('modalProductPrice');
        const mDescLong = document.getElementById('modalProductDescriptionLong');
        const mIdInput = document.getElementById('modalProductIdInput');

        function triggerModalFromCard(cardElement) {
            const id = cardElement.getAttribute('data-prod-id');
            const name = cardElement.getAttribute('data-prod-name');
            const price = cardElement.getAttribute('data-prod-price');
            const img = cardElement.getAttribute('data-prod-img');
            const descLong = cardElement.getAttribute('data-prod-desc-long');
            openQuickViewModal(id, name, price, img, descLong);
        }

        function openQuickViewModal(id, name, price, imgUrl, descLong) {
            mName.innerText = name;
            mPrice.innerText = '$' + price;
            mImage.src = imgUrl ? '/imagenes/' + imgUrl : '/imagenes/placeholder.png';
            mIdInput.value = id;

            if (descLong && descLong !== 'null' && descLong.trim() !== '') {
                mDescLong.innerText = descLong;
                mDescLong.classList.remove('italic', 'text-gray-400');
            } else {
                mDescLong.innerText = "Este equipo de alta calidad está diseñado para las condiciones más exigentes.";
                mDescLong.classList.add('italic', 'text-gray-400');
            }

            modal.classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        function closeQuickViewModal() {
            modal.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        modal.addEventListener('click', function(event) {
            if (event.target === modal.firstElementChild) closeQuickViewModal();
        });
    </script>
</body>
</html>
