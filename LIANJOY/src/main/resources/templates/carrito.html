<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - LIANJOY</title>
    <script src="https://cdn.tailwindcss.com"></script> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-terra-green { background-color: #1B4332; }
        .text-terra-green { color: #1B4332; }
        .bg-image-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background-color: #000;
        }
        .bg-image-container img {
            width: 100%; height: 100%; object-fit: cover; filter: blur(10px); opacity: 0.65;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="bg-image-container">
        <img src="/imagenes/fondo.png" alt="fondo">
    </div>

    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 p-4 flex justify-between items-center sticky top-0 z-50">
        <a href="/" class="flex items-center gap-2">
            <div class="bg-terra-green p-1.5 rounded-lg">
                <span class="text-white font-black text-xl italic tracking-tighter">LJ</span>
            </div>
            <span class="text-terra-green font-extrabold text-xl tracking-tight">LIANJOY</span>
        </a>
        <span class="text-sm font-bold text-gray-600 uppercase tracking-widest">Mi Carrito</span>
        <a href="/" class="text-xs font-bold border border-terra-green text-terra-green px-4 py-1.5 rounded-full hover:bg-terra-green hover:text-white transition">Volver</a>
    </nav>

    <div class="p-4 max-w-2xl mx-auto">
        <div class="bg-white/90 backdrop-blur-sm rounded-3xl p-6 shadow-lg border border-white/50 mb-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800 italic">Resumen de Pedido</h2>
        </div>

        <div class="space-y-4">
            <div th:each="producto : ${productosCarrito}" class="bg-white/90 backdrop-blur-sm rounded-2xl p-4 shadow-lg border border-white/50 flex gap-4">
                <div class="w-20 h-20 bg-white rounded-xl flex items-center justify-center overflow-hidden border border-gray-100">
                    <img th:src="@{'/imagenes/' + ${producto.imagenUrl}}" class="object-contain h-16 w-16" th:alt="${producto.nombre}">
                </div>
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-sm text-gray-800" th:text="${producto.nombre}">Nombre</h3>
                        <p class="text-[10px] text-gray-500 uppercase">Equipo de expedición</p>
                    </div>
                    <div class="flex justify-between items-end">
                        <div class="flex flex-col">
                            <span class="text-terra-green font-bold text-sm" th:text="${producto.precio != null ? '$' + producto.precio : '$0.00'}"></span>
                            <span class="text-[9px] text-gray-400 font-semibold">Cant: 1</span>
                        </div>
                        <form th:action="@{/carrito/eliminar}" method="post">
                            <input type="hidden" name="id" th:value="${producto.id}">
                            <button type="submit" class="text-red-500 text-[10px] uppercase font-black hover:text-red-700 transition">Eliminar</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(productosCarrito)}" class="text-center py-20 bg-white/80 rounded-3xl border border-dashed border-gray-300">
                <p class="text-gray-500 italic">No has añadido equipo aún.</p>
                <a href="/" class="text-terra-green font-bold text-sm underline mt-2 block">Explorar tienda</a>
            </div>
        </div>

        <div th:if="${!#lists.isEmpty(productosCarrito)}" class="mt-8 bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-2xl">
            <div class="flex justify-between text-gray-500 text-sm mb-2">
                <span>Total parcial</span>
                <span class="font-semibold" th:text="'$' + ${total}">$0.0</span>
            </div>
            <div class="flex justify-between text-gray-500 text-sm mb-4">
                <span>Envío</span>
                <span class="text-green-600 font-bold uppercase text-[10px] bg-green-50 px-2 py-0.5 rounded-full">Gratis</span>
            </div>
            <hr class="border-gray-100 mb-4">
            <div class="flex justify-between items-center mb-6">
                <span class="text-lg font-bold text-gray-800">Total</span>
                <span class="text-2xl font-black text-terra-green" th:text="'$' + ${total}">$0.0</span>
            </div>
            <a href="/checkout" class="w-full bg-[#1B4332] text-center text-white py-4 rounded-2xl font-black text-lg shadow-xl block uppercase tracking-widest hover:bg-green-900 transition-all">
                Finalizar Compra
            </a>
        </div>
    </div>
</body>
</html>
