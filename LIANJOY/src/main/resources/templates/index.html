<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - LIANJOY</title>
    <script src="https://cdn.tailwindcss.com"></script> 
    <style>
        .bg-terra-green { background-color: #1B4332; }
        .text-terra-green { color: #1B4332; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-terra-green text-white p-4 flex justify-between items-center sticky top-0 z-50">
        <a href="/" class="flex items-center gap-2">
            <span class="text-xl font-bold italic">LIANJOY</span>
        </a>
        <span class="text-sm font-light uppercase tracking-widest">Mi Carrito</span>
        <a href="/" class="text-xs border border-white/40 px-3 py-1 rounded-full hover:bg-white/10 transition">Volver</a>
    </nav>

    <div class="p-4 max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Resumen de Pedido</h2>

        <div class="space-y-4">
            
            <div th:each="d : ${detalles}" class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex gap-4">
                
                <div class="w-20 h-20 bg-gray-50 rounded-xl flex items-center justify-center overflow-hidden border border-gray-100">
                    <img th:src="${d.producto.imagenUrl != null ? d.producto.imagenUrl : 'https://via.placeholder.com/80'}" 
                         class="object-contain h-16 w-16" alt="Producto">
                </div>
                
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-sm text-gray-800" th:text="${d.producto.nombre}">Nombre Producto</h3>
                        <p class="text-[10px] text-gray-400 uppercase truncate max-w-[200px]" th:text="${d.producto.descripcion}">Descripción corta...</p>
                    </div>
                    
                    <div class="flex justify-between items-end">
                        <div class="flex flex-col">
                            <span class="text-terra-green font-bold text-sm" th:text="'$' + ${d.precioUnitario}">$0.00</span>
                            <span class="text-[9px] text-gray-400" th:text="'Cant: ' + ${d.cantidad}">Cant: 1</span>
                        </div>
                        
                        <form th:action="@{'/carrito/eliminar/' + ${d.id}}" method="post">
                            <button type="submit" class="text-red-500 text-[10px] uppercase font-bold tracking-wider hover:underline hover:text-red-700 transition">
                                Eliminar
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(detalles)}" class="text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
                <p class="text-gray-400 italic">No has añadido equipo aún.</p>
                <a href="/" class="text-terra-green font-bold text-sm underline mt-2 block">Explorar tienda</a>
            </div>
        </div>

        <div th:if="${!#lists.isEmpty(detalles)}" class="mt-8 bg-white rounded-3xl p-6 shadow-xl border-t-4 border-terra-green">
            <div class="flex justify-between text-gray-500 text-sm mb-2">
                <span>Subtotal</span>
                <span th:text="'$' + ${totalGeneral}">$0.00</span>
            </div>
            <div class="flex justify-between text-gray-500 text-sm mb-4">
                <span>Envío</span>
                <span class="text-green-600 font-bold uppercase text-[10px]">Gratis</span>
            </div>
            <hr class="border-gray-100 mb-4">
            <div class="flex justify-between items-center mb-6">
                <span class="text-lg font-bold text-gray-800">Total</span>
                <span class="text-2xl font-black text-terra-green" th:text="'$' + ${totalGeneral}">$0.00</span>
            </div>
            
            <button class="w-full bg-[#1B4332] text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform uppercase tracking-widest hover:bg-green-900">
                Finalizar Compra
            </button>
        </div>
    </div>

</body>
</html>
