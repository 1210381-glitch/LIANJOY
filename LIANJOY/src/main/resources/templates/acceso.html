<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - LIANJOY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-terra-green { background-color: #1B4332; }
        .text-terra-green { color: #1B4332; }
        
        .bg-image-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background-color: #000;
        }
        .bg-image-container img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(8px);
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen items-center p-4">

    <div class="bg-image-container">
        <img src="/imagenes/fondo.png" alt="fondo">
    </div>

    <div class="mt-8 mb-8">
        <a href="/" class="text-4xl font-black text-white italic tracking-tighter drop-shadow-lg">LIANJOY</a>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-2xl border border-gray-100 w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">Bienvenido</h1>

        <div th:if="${error}" class="mb-6 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-3 animate-pulse">
            <svg class="h-5 w-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <span th:text="${error}">Error al intentar acceder</span>
        </div>

        <form th:action="@{/api/auth/procesar-acceso}" th:object="${usuario}" method="post" class="space-y-5">
            
            <div class="flex gap-2 p-1 bg-gray-100 rounded-xl mb-6">
                <label class="flex-1 text-center py-2 rounded-lg cursor-pointer transition-all text-sm font-semibold bg-white shadow-sm text-terra-green" id="tab-login">
                    <input type="radio" name="modo" value="login" class="hidden" checked onchange="toggleModo('login')">
                    Iniciar Sesión
                </label>
                <label class="flex-1 text-center py-2 rounded-lg cursor-pointer transition-all text-sm font-medium text-gray-500" id="tab-registro">
                    <input type="radio" name="modo" value="registro" class="hidden" onchange="toggleModo('registro')">
                    Soy nuevo
                </label>
            </div>

            <div id="campo-nombre" class="hidden">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Nombre Completo</label>
                <input type="text" th:field="*{nombre}" id="nombreInput"
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all"
                       placeholder="Tu nombre y apellido">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Correo Electrónico</label>
                <input type="email" th:field="*{email}" id="emailInput" required 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all"
                       placeholder="ejemplo@correo.com">
            </div>

            <div id="campo-telefono" class="hidden">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Teléfono</label>
                <input type="text" th:field="*{telefono}" id="telefonoInput"
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all"
                       placeholder="123 456 7890">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Contraseña</label>
                <input type="password" th:field="*{password}" id="passwordInput" required 
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all"
                       placeholder="••••••••">
            </div>

            <div class="pt-4">
                <button type="submit" 
        id="btnContinuar"
        class="w-full bg-[#1B4332] text-white py-4 rounded-xl font-bold hover:bg-green-900 transition-all shadow-lg active:scale-[0.98]">
    <span id="btn-text">Continuar</span>
</button>
            </div>
        </form>

        <p class="mt-8 text-[11px] text-gray-400 text-center leading-relaxed">
            Al continuar, aceptas las <a href="#" class="text-blue-600 hover:underline">Condiciones de uso</a> y el 
            <a href="#" class="text-blue-600 hover:underline">Aviso de privacidad</a> de LIANJOY.
        </p>
    </div>

    <footer class="mt-auto py-8 text-center text-[10px] text-gray-400 font-medium tracking-widest uppercase">
        <div class="flex justify-center space-x-6 mb-2">
            <a href="#" class="hover:text-white transition">Condiciones</a>
            <a href="#" class="hover:text-white transition">Privacidad</a>
            <a href="#" class="hover:text-white transition">Ayuda</a>
        </div>
        <p>&copy; 2026, LIANJOY EQUIPAMIENTO TÉCNICO</p>
    </footer>

    <script>
        function toggleModo(modo) {
            const cNombre = document.getElementById('campo-nombre');
            const cTelefono = document.getElementById('campo-telefono');
            const tabL = document.getElementById('tab-login');
            const tabR = document.getElementById('tab-registro');
            const btnText = document.getElementById('btn-text');

            if (modo === 'registro') {
                cNombre.classList.remove('hidden');
                cTelefono.classList.remove('hidden');
                btnText.innerText = "Crear cuenta de LIANJOY";
                
                // Estilos pestañas
                tabR.classList.add('bg-white', 'shadow-sm', 'text-terra-green', 'font-semibold');
                tabR.classList.remove('text-gray-500');
                tabL.classList.remove('bg-white', 'shadow-sm', 'text-terra-green', 'font-semibold');
                tabL.classList.add('text-gray-500');
            } else {
                cNombre.classList.add('hidden');
                cTelefono.classList.add('hidden');
                btnText.innerText = "Continuar";
                
                // Estilos pestañas
                tabL.classList.add('bg-white', 'shadow-sm', 'text-terra-green', 'font-semibold');
                tabL.classList.remove('text-gray-500');
                tabR.classList.remove('bg-white', 'shadow-sm', 'text-terra-green', 'font-semibold');
                tabR.classList.add('text-gray-500');
            }
        }
    </script>
</body>
</html>
