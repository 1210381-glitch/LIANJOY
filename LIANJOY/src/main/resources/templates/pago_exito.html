<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>¡Compra Exitosa! - LIANJOY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-terra-green { background-color: #1B4332; }
        .bg-image-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-color: #000;
        }
        .bg-image-container img {
            width: 100%; height: 100%; object-fit: cover; filter: blur(20px); opacity: 0.4;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-image-container"><img src="/imagenes/fondo.png"></div>

    <div class="max-w-2xl w-full bg-white/90 backdrop-blur-xl rounded-[3rem] p-10 shadow-2xl border border-white text-center">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-4xl font-black text-gray-800 mb-2 italic">¡PEDIDO CONFIRMADO!</h1>
        <p class="text-gray-500 font-bold uppercase tracking-[0.2em] text-xs mb-8">Tu equipo de expedición va en camino</p>

        <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 mb-8 text-left">
            <h3 class="font-black text-gray-800 text-sm mb-4 uppercase">Resumen de envío</h3>
            <p class="text-gray-600 text-sm mb-1">Entregar en:</p>
            <p class="font-bold text-gray-800 text-sm mb-4" th:text="${direccion}">Calle Falsa 123</p>
            
            <hr class="mb-4">
            
            <div class="flex justify-between items-center">
                <span class="text-gray-500 font-bold text-xs uppercase">Total Pagado</span>
                <span class="text-terra-green font-black text-2xl" th:text="'$' + ${total}">$0.00</span>
            </div>
        </div>

        <a href="/" class="inline-block bg-[#1B4332] text-white px-10 py-4 rounded-2xl font-black uppercase tracking-widest hover:scale-105 transition-transform shadow-lg">
            Volver a la Tienda
        </a>
    </div>
</body>
</html>
